name: GitHub release

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ipa
    runs-on: macos-latest
    timeout-minutes: 120

    env:
      BOORUSAMA_USE_FVM: "false"
      OUTPUT_DIR: release-artifacts/ipa

    steps:
      - name: Check out Boorusama
        uses: actions/checkout@v6

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.41.9
          cache: true

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install Apple packaging dependencies
        shell: bash
        run: |
          set -euo pipefail
          brew install create-dmg
          sudo gem install cocoapods

      - name: Initialize workspace
        shell: bash
        run: |
          set -euo pipefail
          ./init.sh

      - name: Build GitHub release artifact
        shell: bash
        run: |
          set -euo pipefail

          args=(
            release
            github
            build
            ipa
            --ci
            --allow-dirty
            --no-codesign
            --output-dir
            "$OUTPUT_DIR"
          )

          ./build.sh "${args[@]}"

      - name: Upload release artifact
        uses: actions/upload-artifact@v7
        with:
          name: boorusama-ipa
          path: ${{ env.OUTPUT_DIR }}/**
          if-no-files-found: error
