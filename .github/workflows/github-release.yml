name: GitHub release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to build and publish."
        required: true
        default: ""
      prerelease:
        description: "Mark the draft release as a prerelease"
        required: true
        type: boolean
        default: false
      recreate_release:
        description: "Delete an existing release and tag before publishing"
        required: true
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ipa
    runs-on: macos-latest
    timeout-minutes: 120

    env:
      BOORUSAMA_USE_FVM: "false"
      OUTPUT_DIR: release-artifacts/ipa

    steps:
      - name: Check out Boorusama
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.release_tag }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.41.9
          cache: true

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install Apple packaging dependencies
        shell: bash
        run: |
          set -euo pipefail
          brew install create-dmg
          sudo gem install cocoapods

      - name: Initialize workspace
        shell: bash
        run: |
          set -euo pipefail
          ./init.sh

      - name: Build GitHub release artifact
        shell: bash
        run: |
          set -euo pipefail

          args=(
            release
            github
            build
            ipa
            --ci
            --allow-dirty
            --no-codesign
            --output-dir
            "$OUTPUT_DIR"
          )

          ./build.sh "${args[@]}"

      - name: Upload release artifact
        uses: actions/upload-artifact@v7
        with:
          name: boorusama-ipa
          path: ${{ env.OUTPUT_DIR }}/**
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GH_TOKEN: ${{ github.token }}
      BOORUSAMA_USE_FVM: "false"
    steps:
      - name: Check out Boorusama
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.release_tag }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.41.9
          cache: true

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets

      - name: Delete existing release
        if: inputs.recreate_release
        shell: bash
        run: |
          set -euo pipefail
          gh release delete "${{ inputs.release_tag }}" \
            --repo "${{ github.repository }}" \
            --cleanup-tag \
            --yes || true

      - name: Publish draft GitHub release
        shell: bash
        run: |
          set -euo pipefail

          args=(
            release
            github
            publish
            --ci
            --repo
            "${{ github.repository }}"
            --artifacts-dir
            release-assets
          )

          args+=(--tag "${{ inputs.release_tag }}")
          args+=(--title "Boorusama ${{ inputs.release_tag }}")

          if [[ "${{ inputs.prerelease }}" == "true" ]]; then
            args+=(--prerelease)
          fi

          ./build.sh "${args[@]}"
